http:
  method: GET
  url: "{{url_api}}/v2/credit-notes/:number/download-pdf"
  params:
    - name: number
      value: NC206
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

