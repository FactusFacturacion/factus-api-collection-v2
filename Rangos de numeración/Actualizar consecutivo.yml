info:
  name: Actualizar consecutivo
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{url_api}}/v2/numbering-ranges/:numbering_range_id/current"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: numbering_range_id
      value: "189"
      type: path
  body:
    type: json
    data: |-
      {
          "current": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

