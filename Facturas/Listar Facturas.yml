info:
  name: Listar Facturas
  type: http
  seq: 5

http:
  method: GET
  url: "{{url_api}}/v2/bills"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: filter[identification]
      value: ""
      type: query
      description: Buscar por numero de identificacion
      disabled: true
    - name: filter[names]
      value: ""
      type: query
      description: Buscar por el nombre del cliente
      disabled: true
    - name: filter[number]
      value: ""
      type: query
      description: Buscar por numero de factura
      disabled: true
    - name: filter[prefix]
      value: ""
      type: query
      description: Buscar por prefijo de rango de numeracion
      disabled: true
    - name: filter[reference_code]
      value: ""
      type: query
      description: Buscar por codigo de referencia
      disabled: true
    - name: filter[status]
      value: ""
      type: query
      description: Buscar por estado del documento. 1 = validado, 0 si no esta validado
      disabled: true
    - name: page
      value: "2"
      type: query
      disabled: true
  body:
    type: text
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

  [https://developers.factus.com.co/facturas/listar-y-filtrar/](https://developers.factus.com.co/facturas/listar-y-filtrar/)
