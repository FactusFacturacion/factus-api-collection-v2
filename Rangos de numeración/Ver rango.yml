info:
  name: Ver rango
  type: http
  seq: 3

http:
  method: GET
  url: "{{url_api}}/v2/numbering-ranges/:numbering_range_id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: numbering_range_id
      value: "190"
      type: path
      description: ID del rango de numeracion
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

  [https://developers.factus.com.co/rangos-de-numeracion/ver-rango/](https://developers.factus.com.co/rangos-de-numeracion/ver-rango/)
