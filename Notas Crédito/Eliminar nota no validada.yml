info:
  name: Eliminar nota no validada
  type: http
  seq: 2

http:
  method: DELETE
  url: "{{url_api}}/v2/credit-notes/reference/:reference_code"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: reference_code
      value: "{{credit_reference_code}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

  [https://developers.factus.com.co/notas-credito/eliminar/](https://developers.factus.com.co/notas-credito/eliminar/)
