info:
  name: auth
  type: http
  seq: 1

http:
  method: POST
  url: "{{url_api}}/oauth/token"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: grant_type
        type: text
        value: password
      - name: client_id
        type: text
        value: "{{client_id}}"
      - name: client_secret
        type: text
        value: "{{client_secret}}"
      - name: username
        type: text
        value: "{{email}}"
      - name: password
        type: text
        value: "{{password}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

  [https://developers.factus.com.co/autenticacion/auth/](https://developers.factus.com.co/autenticacion/auth/)
