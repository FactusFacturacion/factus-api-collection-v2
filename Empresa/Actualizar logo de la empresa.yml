info:
  name: Actualizar logo de la empresa
  type: http
  seq: 3

http:
  method: POST
  url: "{{url_api}}/v2/companies/logo"
  body:
    type: multipart-form
    data:
      - name: image
        type: file
        value:
          - /Users/ivan/Pictures/logos/default2-250x250.png
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

  [https://developers.factus.com.co/empresas/actualizar-imagen/](https://developers.factus.com.co/empresas/actualizar-imagen/)
