info:
  name: Ver nota crédito
  type: http
  seq: 3

http:
  method: GET
  url: "{{url_api}}/v2/credit-notes/:number"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: number
      value: NC206
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Ver Documentación:**

  [https://developers.factus.com.co/notas-credito/ver/](https://developers.factus.com.co/notas-credito/ver/)
